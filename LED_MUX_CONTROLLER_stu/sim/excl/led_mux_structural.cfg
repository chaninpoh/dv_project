// -----------------------------------------------------------------------
// BRANCH COVERAGE — LED_mux structural unreachable branches
//   Branch 2 (casez out_counter) vector (6): MISSING_DEFAULT for values
//     6–7. out_counter = r_reg[N-1:N-3] (3-bit counter), wrap-around at 5
//     ensures out_counter is always in {0,1,2,3,4,5}; values 6–7 impossible.
//   Branch 3 (case hex_out[4:0]) vectors (10)–(29): case arms 5'd10–5'd28
//     and MISSING_DEFAULT. hex_out[4:0] receives BCD digits 0–9 only;
//     values 10–28 and the missing-default path are structurally unreachable.
