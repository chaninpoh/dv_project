//==================================================
// LED_mux Structural Dead-Code Waivers
// Reason: The LED_mux hex decoder supports hex values 0x0–0x1C (A–OFF).
//   In this design the inputs come from the BCD converter which always
//   produces decimal digits 0–9 (hex_out[4:0] = 0–9 only).
//   Case arms 5'd10–5'd28 (A, b, C, d, E, F, G, H, I, J, L, O, P, R,
//   S, U, y, Z, OFF) can never be reached via any spec-compliant input.
//
//   Additionally, the casez(out_counter) MISSING_DEFAULT arm is structural:
//   out_counter is r_reg[N-1:N-3], the 3-bit MUX counter that only counts
//   0–5 (wraps at 5). Values 6–7 are architecturally impossible.
// Coverage types: LINE, BRANCH
// Usage: urg -elfile excl/led_mux_structural.cfg ...
//==================================================

// -----------------------------------------------------------------------
// LINE COVERAGE — LED_mux hex decoder dead arms (5'd10–5'd28)
//   Blocks 24–42 correspond to lines 77–95 in LED_mux.v
//   (one block per case arm for hex values A through OFF).
// -----------------------------------------------------------------------

// CHECKSUM: "1243354326 826292260"
//
// ANNOTATION: "ModuleName: LED_mux"
MODULE: LED_mux
//
// ANNOTATION: "FileName: LED_mux.v, LineNumber: 77 — structural: 5'd10 (A) unreachable via BCD"
