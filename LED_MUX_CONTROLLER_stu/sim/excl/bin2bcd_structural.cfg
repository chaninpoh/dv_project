//==================================================
// bin2bcd Structural Dead-Code Waivers
// Reason: BCD double-dabble algorithm for 20-bit input (max 999,999 decimal,
//   6 significant digits). Digit positions dig6–dig10 (7th through 11th digits)
//   represent values 1,000,000 and above, which can never be produced by
//   a 20-bit binary input. These digit registers are architecturally fixed at
//   zero and the add-3 correction condition (dig_reg > 4) can never be TRUE.
//   Condition vector (1 "0") = false branch (value > 4) is structurally dead.
// Coverage types: COND
// Usage: urg -elfile excl/bin2bcd_structural.cfg ...
//==================================================

// -----------------------------------------------------------------------
// CONDITION COVERAGE — bin2bcd structural false-branch gaps
//   Conditions 7–11: dig6_reg through dig10_reg ternary guards.
//   For a 20-bit input (0 to 1,048,575), the maximum displayable value
//   is 999,999 (6 digits). Digits 6–10 (positions 1M and above) are
//   always 0; the ternary condition (dig_reg <= 4'h4) is always TRUE.
//   Vector (1 "0") = false (i.e., dig_reg > 4) is impossible.
// -----------------------------------------------------------------------

// CHECKSUM: "3100635224 2268157730"
//
// ANNOTATION: "ModuleName: bin2bcd"
