//==================================================
// Toggle Coverage Structural Waivers — LED_MUX_CONTROLLER DV
// Format: Synopsys URG elfile (Format Version 2)
// Usage:  urg ... -elfile excl/tgl_structural.cfg
//
// Consolidates all structural toggle waivers:
//   1. APB_Slave::mem       — unmapped register space (entries [4:31])
//   2. APB_Slave::o_pslverr — BUG-003: hardwired 0
//   3. dut::o_pslverr       — BUG-003 propagated through dut wrapper
//   4. apb_if::pslverr      — BUG-003 propagated to TB interface
//
// Only STRUCTURAL gaps are waived here. All fixable toggle gaps
// (rst_n 1→0 reassert, pwdata upper bits, BUG-006 bin[36:11]) are
// tracked as test or RTL action items and are NOT waived.
//==================================================

// -----------------------------------------------------------------------
// APB_Slave: unmapped register space + BUG-003 pslverr
// -----------------------------------------------------------------------

// CHECKSUM: "1939041874 1613836341"
//
// ANNOTATION: "ModuleName: APB_Slave"
MODULE: APB_Slave
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 32 — structural: unmapped register space + reserved bits"
Toggle mem "logic [31:0][31:0]mem"
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 29 — BUG-003: pslverr hardwired to 0, cannot toggle"
Toggle o_pslverr "logic o_pslverr"

// -----------------------------------------------------------------------
// dut: BUG-003 o_pslverr propagation
// -----------------------------------------------------------------------

// CHECKSUM: "1194967829 3912049661"
//
// ANNOTATION: "ModuleName: dut"
MODULE: dut
//
// ANNOTATION: "FileName: dut.sv, LineNumber: 31 — BUG-003: o_pslverr propagated from APB_Slave, always 0"
Toggle o_pslverr "logic o_pslverr"

// -----------------------------------------------------------------------
// apb_if: BUG-003 pslverr propagation into TB interface
// -----------------------------------------------------------------------

// CHECKSUM: "1462543710 517828258"
//
// ANNOTATION: "ModuleName: apb_if"
MODULE: apb_if
//
// ANNOTATION: "FileName: apb_if.sv — BUG-003: pslverr tied to APB_Slave output, always 0"
Toggle pslverr "logic pslverr"
