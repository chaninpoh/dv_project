//==================================================
// APB_Slave Wait-State Dead Code Waivers
// Reason: WAIT_WRITE=0 and WAIT_READ=0 are compile-time parameters.
//   All paths that are only reached when WAIT_WRITE>0 or WAIT_READ>0
//   are structurally unreachable dead code in this configuration.
// Coverage types: LINE, BRANCH, COND
// Usage: urg -elfile excl/apb_slave_waitstate.cfg ...
//==================================================

// -----------------------------------------------------------------------
// LINE COVERAGE — APB_Slave wait-state dead code
//   Lines 70, 75-76, 81, 85-87, 92 are in the WAIT_WRITE / WAIT_READ
//   state machines. With WAIT_WRITE=0 and WAIT_READ=0, the setup phase
//   always takes the no-wait path and these lines are never executed.
// -----------------------------------------------------------------------

// CHECKSUM: "1939041874 2604281238"
//
// ANNOTATION: "ModuleName: APB_Slave"
MODULE: APB_Slave
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 70 — structural: else o_pready<=0 only reachable with WAIT>0"
Block 19 "2046749278" "o_pready <= 1'b0;"
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 75-76 — structural: WAIT_WRITE pready-assert path dead with WAIT_WRITE=0"
Block 22 "1632906478" "o_pready <= 1'b1;"
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 81 — structural: WAIT_WRITE counter increment dead with WAIT_WRITE=0"
Block 25 "1873448508" "count_pready <= (count_pready + 3'(1));"
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 85-87 — structural: WAIT_READ pready-assert path dead with WAIT_READ=0"
Block 28 "4053154576" "o_pready <= 1'b1;"
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 92 — structural: WAIT_READ counter increment dead with WAIT_READ=0"
Block 31 "2477429850" "count_pready <= (count_pready + 3'(1));"

// -----------------------------------------------------------------------
