// -----------------------------------------------------------------------
// CONDITION COVERAGE — APB_Slave structural condition gaps
//   Condition 8:  (WAIT_WRITE == '0) false — WAIT_WRITE is parameter=0, can never be nonzero
//   Condition 10: (WAIT_READ  == '0) false — WAIT_READ  is parameter=0, can never be nonzero
//   Condition 13: (count_pready == WAIT_WRITE-1) true — WAIT_WRITE-1 = -1 = 3'b111,
//                 counter always starts at 0 and never reaches 3'b111
//   Condition 16: (count_pready == WAIT_READ-1)  true — same reasoning as Condition 13
//   Condition 2:  (i_pwrite && o_pready) "10" — write with pready=0, only in WAIT_WRITE>0 path
// -----------------------------------------------------------------------

// CHECKSUM: "1939041874 3104512843"
//
// ANNOTATION: "ModuleName: APB_Slave"
MODULE: APB_Slave
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 47 — Cond 2 (10): write+pready=0 only in WAIT_WRITE>0 path"
Condition 2 "3839041100" "(i_pwrite && o_pready) 1 -1" (2 "10")
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 60 — Cond 8 (0): WAIT_WRITE!=0 impossible (parameter=0)"
Condition 8 "1035004633" "(WAIT_WRITE == '0) 1 -1" (1 "0")
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 63 — Cond 10 (0): WAIT_READ!=0 impossible (parameter=0)"
Condition 10 "78412693" "(WAIT_READ == '0) 1 -1" (1 "0")
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 74 — Cond 13 (1): count==WAIT_WRITE-1==-1==3b111 impossible"
Condition 13 "1339160407" "(count_pready == 3'((WAIT_WRITE - 1))) 1 -1" (2 "1")
//
// ANNOTATION: "FileName: APB_Slave.sv, LineNumber: 84 — Cond 16 (1): count==WAIT_READ-1==-1==3b111 impossible"
Condition 16 "945006319" "(count_pready == 3'((WAIT_READ - 1))) 1 -1" (2 "1")
